    <rect x="160" y="300" width="100" height="28" rx="14" fill="#DDE5EC"/>
    <rect x="272" y="300" width="110" height="28" rx="14" fill="#DDE5EC"/>
    <rect x="48" y="346" width="334" height="44" rx="16" fill="#FFFFFF" stroke="#CCD5DD"/>
    <rect x="48" y="402" width="334" height="44" rx="16" fill="#FFFFFF" stroke="#CCD5DD"/>
    <text x="68" y="375" fill="#18212B" font-family="Arial, sans-serif" font-size="18" font-weight="700">06-12  出库  A01  SZ121  -300</text>
